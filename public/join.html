<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>연수 참여</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="join-page">
  <div class="join-screen" id="nicknameScreen">
    <div class="join-card">
      <div class="join-logo">📊</div>
      <h1>연수에 참여하기</h1>
      <p class="join-subtitle" id="roomTitle">연수</p>
      <label for="nickname">닉네임</label>
      <input type="text" id="nickname" placeholder="이름 또는 닉네임" maxlength="20" autocomplete="off">
      <button id="joinBtn" class="btn-primary btn-large">참여하기</button>
      <p id="joinError" class="error-msg hidden"></p>
    </div>
  </div>

  <div class="audience-screen hidden" id="audienceScreen">
    <header class="audience-header">
      <span class="audience-nickname" id="displayNickname"></span>
      <span class="audience-status">👥 <span id="audienceCount">0</span>명 · ● 연결됨</span>
    </header>

    <!-- 활성 투표 -->
    <div class="poll-vote-panel hidden" id="pollVotePanel">
      <h3 id="pollVoteQuestion"></h3>
      <div class="poll-vote-options" id="pollVoteOptions"></div>
      <p class="poll-voted-msg hidden" id="pollVotedMsg">투표 완료!</p>
    </div>

    <nav class="audience-tabs">
      <button class="aud-tab active" data-tab="react">😊 반응</button>
      <button class="aud-tab" data-tab="question">🙋 질문</button>
      <button class="aud-tab" data-tab="video">🎬 영상</button>
    </nav>

    <main class="audience-main">
      <div class="aud-panel active" id="panel-react">
        <div class="emoji-grid" id="emojiGrid">
          <button class="emoji-btn" data-emoji="👍">👍</button>
          <button class="emoji-btn" data-emoji="❤️">❤️</button>
          <button class="emoji-btn" data-emoji="😂">😂</button>
          <button class="emoji-btn" data-emoji="😮">😮</button>
          <button class="emoji-btn" data-emoji="👏">👏</button>
          <button class="emoji-btn" data-emoji="🔥">🔥</button>
          <button class="emoji-btn" data-emoji="💡">💡</button>
          <button class="emoji-btn" data-emoji="🎉">🎉</button>
        </div>
      </div>

      <div class="aud-panel" id="panel-question">
        <textarea id="questionInput" placeholder="질문을 입력하세요..." maxlength="300" rows="3"></textarea>
        <button class="btn-primary btn-sm" id="submitQuestionBtn">질문 등록</button>
        <div class="my-questions" id="myQuestions"></div>
      </div>

      <div class="aud-panel" id="panel-video">
        <div class="video-input-wrap">
          <label for="videoUrl">유튜브 URL</label>
          <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
          <div class="video-time-wrap">
            <div class="video-time-field">
              <label for="videoStart">시작 (초)</label>
              <input type="number" id="videoStart" placeholder="0" min="0" value="0">
            </div>
            <div class="video-time-field">
              <label for="videoEnd">끝 (초)</label>
              <input type="number" id="videoEnd" placeholder="60" min="0" value="60">
            </div>
          </div>
          <button class="btn-primary" id="playVideoBtn">▶ 재생</button>
        </div>
      </div>
    </main>

    <footer class="audience-footer">
      <div class="chat-input-wrap">
        <input type="text" id="chatInput" placeholder="메시지 입력..." maxlength="200" autocomplete="off">
        <button id="sendBtn" class="btn-send">전송</button>
      </div>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/join.js"></script>
</body>
</html>
