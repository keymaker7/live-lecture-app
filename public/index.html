<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드 연수</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="home-page">
  <div class="home-container">
    <header class="home-header">
      <div class="logo">🌸</div>
      <h1>슬라이드 연수 ✨</h1>
      <p class="subtitle">구글 슬라이드 · 캔바를 공유하고, QR로 모두를 초대해요</p>
    </header>

    <main class="home-card">
      <div class="input-tabs">
        <button class="tab-btn active" data-tab="url">URL 입력</button>
        <button class="tab-btn" data-tab="canva">캔바 Embed 코드</button>
      </div>

      <div class="tab-panel active" id="tab-url">
        <label for="slideUrl">슬라이드 URL</label>
        <input
          type="url"
          id="slideUrl"
          placeholder="https://docs.google.com/presentation/d/... 또는 Canva URL"
          autocomplete="off"
        >
        <p class="input-hint">캔바: 공유 링크 전체를 붙여넣으세요 (…/design/ID/…/view)</p>
      </div>

      <div class="tab-panel" id="tab-canva">
        <label for="canvaEmbed">캔바 Embed HTML 코드</label>
        <textarea
          id="canvaEmbed"
          rows="5"
          placeholder="공유 → Embed → HTML 코드를 붙여넣으세요"
        ></textarea>
        <p class="input-hint canva-guide">
          캔바에서 <strong>공유 → Embed → Embed(공개)</strong>를 선택한 뒤 HTML 코드를 복사하세요.
          비공개 디자인은 403 오류가 납니다.
        </p>
      </div>

      <label for="title">연수 제목 (선택)</label>
      <input type="text" id="title" placeholder="예: 2026 디지털 리터러시 연수" maxlength="50">

      <button id="startBtn" class="btn-primary btn-large">
        ▶ 연수 시작
      </button>

      <p id="errorMsg" class="error-msg hidden"></p>
      <p id="networkHint" class="network-hint"></p>
    </main>

    <footer class="home-footer">
      <div class="feature-list">
        <div class="feature"><span>📱</span> QR 코드로 간편 참여</div>
        <div class="feature"><span>😊</span> 실시간 이모지 반응</div>
        <div class="feature"><span>💬</span> 채팅 메시지 오버레이</div>
      </div>
    </footer>
  </div>

  <script src="/js/index.js"></script>
</body>
</html>
